name: notebook-tests

on:
  push:
    paths:
      - "Gortych_Kyle_ProjectTwo.ipynb"
  pull_request:
    paths:
      - "Gortych_Kyle_ProjectTwo.ipynb"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest numpy

      - name: Run tests
        run: pytest -v
